name: Publish to npm

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build in dependency order
        run: |
          # 1. Base package first (all others depend on this)
          npm run build -w packages/web-component-designer

          # 2. Packages that depend only on base
          npm run build -w packages/web-component-designer-codeview-ace || true
          npm run build -w packages/web-component-designer-codeview-codemirror || true
          npm run build -w packages/web-component-designer-codeview-codemirror5 || true
          npm run build -w packages/web-component-designer-codeview-monaco
          npm run build -w packages/web-component-designer-collaboration-service || true
          npm run build -w packages/web-component-designer-htmlparserservice-base-custom-webcomponent || true
          npm run build -w packages/web-component-designer-htmlparserservice-lit-element || true
          npm run build -w packages/web-component-designer-htmlparserservice-nodehtmlparser
          npm run build -w packages/web-component-designer-stylesheetservice-css-parser || true
          npm run build -w packages/web-component-designer-widgets-wunderbaum
          npm run build -w packages/web-component-designer-zpl || true

          # 3. Last: visualization-addons (depends on codeview-monaco + widgets-wunderbaum)
          npm run build -w packages/web-component-designer-visualization-addons

      - name: Bundle all packages
        run: npm run bundle --workspaces --if-present

      - name: Publish all packages
        run: |
          for dir in packages/*/; do
            cd "$dir"
            if [ -f package.json ]; then
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VERSION=$(node -p "require('./package.json').version")
              PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
              if [ -z "$PUBLISHED" ]; then
                echo "Publishing $PKG_NAME@$PKG_VERSION..."
                npm publish --access public
              else
                echo "Skipping $PKG_NAME@$PKG_VERSION (already published)"
              fi
            fi
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
